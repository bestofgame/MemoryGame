<!DOCTYPE html>
<html>
<head>
	
    <meta charset="UTF-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
	<title>MemoryGame</title>
	
	<link rel="manifest" href="appmanifest.json" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, minimal-ui" />
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="apple-touch-icon" sizes="256x256" href="icon-256.png" />
	<meta name="HandheldFriendly" content="true" />
	<meta name="mobile-web-app-capable" content="yes" />
	<link rel="shortcut icon" sizes="256x256" href="icon-256.png" />

	<style type="text/css">
		* {
			padding: 0;
			margin: 0;
		}
		html, body {
			background: #000;
			color: #fff;
			overflow: hidden;
			width: 100%;
			height: 100%;
		}
		
		/* CENTRAGE DU JEU (Réduit de 5%) */
		#c2canvasdiv {
			position: absolute;
			top: 50%;
			left: 50%;
			transform: translate(-50%, -50%);
			width: 95vw !important; 
			height: 95vh !important;
			display: flex;
			justify-content: center;
			align-items: center;
			z-index: 1;
		}

		canvas {
			max-width: 100%;
			max-height: 100%;
			object-fit: contain;
			touch-action-delay: none;
			touch-action: none;
			-ms-touch-action: none;
		}

		/* BANNIÈRES GAUCHE ET DROITE */
		.ad-layer {
			position: fixed;
			top: 50%;
			transform: translateY(-50%);
			width: 160px;
			height: 600px;
			z-index: 2147483647; /* Toujours au premier plan */
		}
		
		.ad-left { left: 0; }
		.ad-right { right: 0; }
    </style>
</head> 
 
<body> 
	<div id="fb-root"></div>

	<div class="ad-layer ad-left">
		<script type="text/javascript">
			atOptions = {
				'key' : '9b61f7351b78d433de0ffc16189bc341',
				'format' : 'iframe',
				'height' : 600,
				'width' : 160,
				'params' : {}
			};
		</script>
		<script type="text/javascript" src="https://www.highperformanceformat.com/9b61f7351b78d433de0ffc16189bc341/invoke.js"></script>
	</div>

	<div class="ad-layer ad-right">
		<script type="text/javascript">
			atOptions = {
				'key' : '9b61f7351b78d433de0ffc16189bc341',
				'format' : 'iframe',
				'height' : 600,
				'width' : 160,
				'params' : {}
			};
		</script>
		<script type="text/javascript" src="https://www.highperformanceformat.com/9b61f7351b78d433de0ffc16189bc341/invoke.js"></script>
	</div>
	
	<div id="c2canvasdiv">
		<canvas id="c2canvas" width="1280" height="720">
			<h1>Your browser does not appear to support HTML5.</h1>
		</canvas>
	</div>
	
	<script src="jquery-2.1.1.min.js"></script>
	<script src="c2runtime.js"></script>

    <script>
		jQuery(document).ready(function ()
		{			
			cr_createRuntime("c2canvas");
		});
		
		function onVisibilityChanged() {
			if (document.hidden || document.mozHidden || document.webkitHidden || document.msHidden)
				cr_setSuspended(true);
			else
				cr_setSuspended(false);
		};
		
		document.addEventListener("visibilitychange", onVisibilityChanged, false);
		document.addEventListener("mozvisibilitychange", onVisibilityChanged, false);
		document.addEventListener("webkitvisibilitychange", onVisibilityChanged, false);
		document.addEventListener("msvisibilitychange", onVisibilityChanged, false);
		
		window.C2_RegisterSW = function C2_RegisterSW()
		{
			if (!navigator.serviceWorker) return;
			try {
				navigator.serviceWorker.register("sw.js", { scope: "./" });
			} catch (e) {}
		};
    </script>
</body> 
</html>
